<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenClaw — OAuth Callback</title>
  <style>
    body{font-family:Inter,Arial;background:#0e1428;color:#eef2ff;margin:0}
    main{max-width:900px;margin:32px auto;padding:0 20px}
    .card{background:#151d3a;border:1px solid #2d3a6b;border-radius:14px;padding:24px}
    .ok{color:#74f0a7;font-weight:700}
    .btn{display:inline-block;margin-top:14px;background:#6aa3ff;color:#061332;padding:12px 16px;border-radius:10px;font-weight:700;border:0;cursor:pointer}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    pre{white-space:pre-wrap;word-break:break-word;background:#0b1126;padding:14px;border-radius:10px;border:1px solid #2d3a6b}
    input{background:#0b1126;color:#eef2ff;border:1px solid #2d3a6b;border-radius:8px;padding:10px;width:100%;margin:8px 0}
    .small{font-size:13px;color:#b8c1ea}
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>OpenClaw — TikTok OAuth Callback</h1>
      <p id="statusText"></p>
      <p><strong>Auth code:</strong> <span id="maskedCode">(none)</span></p>

      <h3>Post Test Video (Sandbox)</h3>
      <p class="small">This button calls a local Node proxy at <code>http://127.0.0.1:8787/post-test</code> to run TikTok API server-side.</p>
      <label>Video URL (small test mp4)</label>
      <input id="videoUrl" type="url" value="https://samplelib.com/lib/preview/mp4/sample-5s.mp4" />
      <button id="postBtn" class="btn">Post Test Video</button>
      <pre id="apiResponse">API response will appear here.</pre>
    </div>
  </main>

  <script>
    const qp = new URLSearchParams(window.location.search);
    const code = qp.get('code') || '';
    const statusText = document.getElementById('statusText');
    const maskedCodeEl = document.getElementById('maskedCode');

    if (code) {
      const masked = code.length <= 8 ? code : code.slice(0, 8) + '*'.repeat(Math.max(4, Math.min(24, code.length - 8)));
      statusText.innerHTML = '<span class="ok">Authorization successful! OpenClaw now has permission to post on your behalf.</span>';
      maskedCodeEl.textContent = masked;
    } else {
      statusText.textContent = 'Authorization code not found in URL query parameters.';
      maskedCodeEl.textContent = '(missing code)';
    }

    async function postTestVideo() {
      const out = document.getElementById('apiResponse');
      const btn = document.getElementById('postBtn');
      const videoUrl = document.getElementById('videoUrl').value.trim();

      if (!code) {
        out.textContent = 'Missing OAuth code in URL.';
        return;
      }

      btn.disabled = true;
      out.textContent = 'Calling local proxy...';
      try {
        const res = await fetch('http://127.0.0.1:8787/post-test', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, videoUrl })
        });
        const txt = await res.text();
        let parsed;
        try { parsed = JSON.parse(txt); } catch { parsed = txt; }
        out.textContent = JSON.stringify({ http_status: res.status, response: parsed }, null, 2);
      } catch (err) {
        out.textContent = 'Request failed: ' + (err?.message || String(err));
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('postBtn').addEventListener('click', postTestVideo);
  </script>
</body>
</html>
