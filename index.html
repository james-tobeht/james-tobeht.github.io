<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JamesTobeht — Social Media Management for Content Creators</title>
  <style>
    :root{--bg:#0b1020;--card:#121936;--text:#e9ecff;--muted:#aab2d5;--brand:#6aa3ff;}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,Arial;background:linear-gradient(180deg,#0a0f1f,#111835);color:var(--text)}
    .wrap{max-width:980px;margin:0 auto;padding:28px 20px}
    nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:56px}
    .logo{font-weight:800;letter-spacing:.3px;display:flex;align-items:center;gap:10px}
    .logo img{width:40px;height:40px;border-radius:10px}
    .nav a{color:var(--muted);text-decoration:none;margin-left:18px}
    .hero{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);padding:44px;border-radius:16px}
    h1{margin:0 0 10px;font-size:42px;line-height:1.1}
    p{color:var(--muted);font-size:18px;max-width:760px}
    .cta{display:inline-block;margin-top:18px;background:var(--brand);color:#071230;padding:12px 18px;border-radius:10px;font-weight:700;text-decoration:none}
  </style>
</head>
<body>
  <div class="wrap">
    <nav>
      <div class="logo">
        <img src="/openclaw-icon.jpg" alt="JamesTobeht icon">
        JamesTobeht
      </div>
      <div class="nav">
        <a href="/demo">Demo</a>
        <a href="/terms">Terms</a>
        <a href="/privacy">Privacy</a>
      </div>
    </nav>
    <section class="hero">
      <h1>Social Media Management for Content Creators</h1>
      <p>JamesTobeht helps creators automate publishing workflows across TikTok, YouTube Shorts, and Instagram Reels with scheduling, QA checks, and analytics.</p>
      <a class="cta" href="/demo">View TikTok OAuth Demo</a>
    </section>
  </div>
</body>
</html>
